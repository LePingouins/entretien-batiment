name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test --no-daemon

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup sentry-cli (if SENTRY_AUTH_TOKEN present)
        if: ${{ secrets.SENTRY_AUTH_TOKEN }}
        uses: getsentry/action-setup-sentry@v1

      - name: Create Sentry release and upload sourcemaps
        if: ${{ secrets.SENTRY_AUTH_TOKEN }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        working-directory: frontend
        run: |
          export SENTRY_RELEASE=${{ github.sha }}
          sentry-cli releases new $SENTRY_RELEASE || true
          sentry-cli releases files $SENTRY_RELEASE upload-sourcemaps ./dist --url-prefix '~/' --rewrite
          sentry-cli releases finalize $SENTRY_RELEASE || true
