groups:
  - name: entretien-alerts
    rules:
      - alert: HighErrorRate
        expr: increase(http_server_requests_seconds_count{status!~"2.."}[5m]) > 5
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "High error rate detected"
          description: "{{ $value }} errors in the last 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, uri)) > 1
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "High request latency (95th percentile)"
          description: "95th percentile latency > 1s for some endpoints"
