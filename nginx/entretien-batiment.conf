# =============================================================================
# Nginx configuration for entretien-batiment.com
#
# DEPLOY: Copy this file to /etc/nginx/sites-available/entretien-batiment.conf
#         then: ln -s /etc/nginx/sites-available/entretien-batiment.conf /etc/nginx/sites-enabled/
#               nginx -t && systemctl reload nginx
#
# ASSUMPTION: Certbot / Let's Encrypt has already issued the TLS certificate.
#             If not, run:  certbot --nginx -d entretien-batiment.com -d www.entretien-batiment.com
# =============================================================================

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name entretien-batiment.com www.entretien-batiment.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name entretien-batiment.com www.entretien-batiment.com;

    # TLS certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/entretien-batiment.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entretien-batiment.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/entretien-batiment;
    index index.html;

    # ── HTTP Security Headers ─────────────────────────────────────────────────
    # These are the headers that security tools (e.g. HP Wolf Security, browsers)
    # check to determine whether a site is trustworthy.

    # Enforce HTTPS for 1 year; include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent the page from being embedded in iframes (anti-clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features / sensors
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy — tightened for a single-page app
    # - script-src 'self'          : only our own JS bundles (no CDN, no inline scripts)
    # - style-src 'self' 'unsafe-inline' : Tailwind CSS needs inline styles
    # - img-src 'self' data: blob: : blob: needed by SecureImage; data: for base64 imgs
    # - connect-src 'self' wss:    : API calls + WebSocket for notifications
    # - frame-ancestors 'none'     : replaces X-Frame-Options for modern browsers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://entretien-batiment.com wss://www.entretien-batiment.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Static Frontend (React SPA) ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Aggressive caching for hashed JS/CSS assets
        location ~* \.(js|css|woff2|png|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Re-declare security headers inside nested location (Nginx inheritance quirk)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }

    # ── Backend API (Spring Boot on port 8080) ────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket (notifications) ─────────────────────────────────────────────
    location /ws-notifications/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }
}
