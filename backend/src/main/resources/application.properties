####################################
# Application
####################################
spring.application.name=backend
server.port=8080

####################################
# Database (PostgreSQL - Docker)
####################################
spring.datasource.url=jdbc:postgresql://localhost:5433/entretien
spring.datasource.username=entretien_user
spring.datasource.password=entretien_pass
spring.datasource.driver-class-name=org.postgresql.Driver

####################################
# JPA / Hibernate
####################################
# VERY IMPORTANT:
# validate = Hibernate checks schema but DOES NOT create tables
# Flyway is responsible for schema creation
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

####################################
# Flyway (database migrations)
####################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

####################################
# Logging (nice defaults for dev)
####################################
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

####################################
# Jackson (JSON)
####################################
spring.jackson.serialization.indent_output=true

####################################
# Actuator (optional, safe defaults)
####################################
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# JWT
security.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_64+_CHARS
security.jwt.access-minutes=15
security.jwt.refresh-days=30

# Cookie (dev)
security.cookie.secure=false
security.cookie.name=refresh_token
