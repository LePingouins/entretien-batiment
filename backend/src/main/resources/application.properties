####################################
# Application
####################################
spring.application.name=backend
server.port=${SERVER_PORT:8080}

####################################
# Database (PostgreSQL - Docker)
####################################
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:entretien}
spring.datasource.username=${DB_USERNAME:entretien_user}
spring.datasource.password=${DB_PASSWORD:entretien_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

####################################
# JPA / Hibernate
####################################
# VERY IMPORTANT:
# validate = Hibernate checks schema but DOES NOT create tables
# Flyway is responsible for schema creation
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

####################################
# Flyway (database migrations)
####################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

####################################
# Logging (nice defaults for dev)
####################################
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

####################################
# Jackson (JSON)
####################################
spring.jackson.serialization.indent_output=true

####################################
# Actuator (optional, safe defaults)
####################################
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

####################################
# Scheduled Jobs / Backup
####################################
app.backup.dir=uploads/backups
app.backup.db-container=entretien-db
app.backup.db-name=${DB_NAME:entretien}
app.backup.retention-days=30

# JWT
security.jwt.secret=${JWT_SECRET}

# Default technician assigned to new work orders (set via env var, no hardcoded email in source)
app.default-technician-email=${DEFAULT_TECHNICIAN_EMAIL:}
# Access token lasts 30 days (43200 minutes)
security.jwt.access-minutes=${JWT_ACCESS_MINUTES:43200}
security.jwt.refresh-days=${JWT_REFRESH_DAYS:30}
security.jwt.session-refresh-hours=${JWT_SESSION_REFRESH_HOURS:24}

# Cookie (dev)
security.cookie.secure=${COOKIE_SECURE:false}
security.cookie.name=${COOKIE_NAME:refresh_token}

####################################
# File Upload Limits
####################################
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
