####################################
# Application
####################################
spring.application.name=backend
server.port=${SERVER_PORT:8080}

####################################
# Database (PostgreSQL - Docker)
####################################
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:entretien}
spring.datasource.username=${DB_USERNAME:entretien_user}
spring.datasource.password=${DB_PASSWORD:entretien_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

####################################
# JPA / Hibernate
####################################
# VERY IMPORTANT:
# validate = Hibernate checks schema but DOES NOT create tables
# Flyway is responsible for schema creation
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.open-in-view=false

####################################
# Flyway (database migrations)
####################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

####################################
# Logging (nice defaults for dev)
####################################
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=${HIBERNATE_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:WARN}

####################################
# Jackson (JSON)
####################################
spring.jackson.serialization.indent_output=true

####################################
# Actuator (optional, safe defaults)
####################################
# Expose health, info, metrics and Prometheus endpoint
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
# Enable Prometheus endpoint and Micrometer Prometheus export
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Sentry (error reporting) — provide SENTRY_DSN as an env var in production
# Example: export SENTRY_DSN=https://public@sentry.io/12345
# Sentry will be disabled if SENTRY_DSN is not set.
# Additional Sentry config can be supplied via SENTRY_* env vars per Sentry docs.

# Dev-only test endpoints
app.dev.enable-test-endpoints=false

####################################
# File Uploads
####################################
# Base directory for all uploaded files (work orders, expenses, rep-trips, backups).
# Defaults to "uploads" (relative to JVM working dir) so dev keeps working unchanged.
# In production set UPLOAD_DIR=/var/lib/entretien-batiment/uploads (or similar) in the
# systemd unit so the path is stable regardless of where the JAR is launched from.
app.upload.dir=${UPLOAD_DIR:uploads}

####################################
# Scheduled Jobs / Backup
####################################
app.backup.dir=${app.upload.dir}/backups
app.backup.db-container=entretien-db
app.backup.db-name=${DB_NAME:entretien}
app.backup.retention-days=30

# Google Routes API (key stored as env var — never hardcoded)
google.routes.api.key=${GOOGLE_ROUTES_API_KEY:}

# JWT
security.jwt.secret=${JWT_SECRET}

# Default technician assigned to new work orders (set via env var, no hardcoded email in source)
app.default-technician-email=${DEFAULT_TECHNICIAN_EMAIL:}
# Access token: default 24 hours (1440 minutes). Override via JWT_ACCESS_MINUTES env var.
security.jwt.access-minutes=${JWT_ACCESS_MINUTES:1440}
security.jwt.refresh-days=${JWT_REFRESH_DAYS:30}
security.jwt.session-refresh-hours=${JWT_SESSION_REFRESH_HOURS:24}

# Cookie (dev)
security.cookie.secure=${COOKIE_SECURE:false}
security.cookie.name=${COOKIE_NAME:refresh_token}

####################################
# File Upload Limits
####################################
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
